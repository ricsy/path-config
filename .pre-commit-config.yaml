# Pre-commit 配置文件
# 公共代码质量检查工具

repos:
  # ============================================================
  # 通用 Hooks - 适用于所有项目
  # ============================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # 去除行尾空格
      - id: trailing-whitespace
      # 确保文件以换行符结尾
      - id: end-of-file-fixer
      # 检查 YAML 语法是否正确
      - id: check-yaml
      # 阻止添加大于 5MB 的文件
      - id: check-added-large-files
      # 检查 TOML 语法是否正确
      - id: check-toml
      # 检测 Git 合并冲突标记
      - id: check-merge-conflict
      # 检查 Python 文件的 AST 语法是否正确
      - id: check-ast
      # 检查 JSON 文件语法是否正确
      - id: check-json
      # 检测调试语句（如 pdb、ipdb、pytest.set_trace 等）
      - id: debug-statements
      # 统一行结束符（LF/CRLF）
      - id: mixed-line-ending
      # 检测大小写冲突的文件（如 foo.ts 和 Foo.ts）
      - id: check-case-conflict
      # 检查符号链接是否有效
      - id: check-symlinks
      # 格式化 JSON 文件（使其更易读）
      - id: pretty-format-json
      # 检测是否意外提交了私钥文件
      - id: detect-private-key

  # ============================================================
  # Python Hooks - Python 项目专用
  # ============================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      # Ruff - Python Linter（自动修复问题）
      - id: ruff
        args: [--fix]
      # Ruff Format - Python 代码格式化
      - id: ruff-format

  # mypy - 静态类型检查
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies: [types-pyyaml]

  # pylint 本地钩子 - 与 pyproject.toml 配置保持一致
  - repo: local
    hooks:
      - id: pylint-all
        name: pylint (all rules)
        entry: python -m pylint
        language: system
        files: \.py$
        args:
          - --disable=E0402,R0903,C0415,E1101,W0212
          - --max-line-length=100
