name: 发布到 PyPI

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      # 1. 构建
      - uses: ricsy/shared-actions/.github/actions/pypi@master

      # 2. 下载构建产物
      - uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      # 3. 发布到 PyPI
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
